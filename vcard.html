<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kooky Kafe — Finest Flavours</title>
<link href="https://fonts.googleapis.com/css2?family=Mirza:wght@400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
@font-face {
  font-family: 'ITC Bauhaus';
  src: url('fonts/ITCBauhaus-Light.woff2') format('woff2'),
       url('fonts/ITCBauhaus-Light.woff') format('woff');
  font-weight: 300;
  font-style: normal;
}
@font-face {
  font-family: 'ITC Bauhaus';
  src: url('fonts/ITCBauhaus-Medium.woff2') format('woff2'),
       url('fonts/ITCBauhaus-Medium.woff') format('woff');
  font-weight: 500;
  font-style: normal;
}
@font-face {
  font-family: 'ITC Bauhaus';
  src: url('fonts/ITCBauhaus-Bold.woff2') format('woff2'),
       url('fonts/ITCBauhaus-Bold.woff') format('woff');
  font-weight: 700;
  font-style: normal;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:        #130801;
  --deep:       #1E0C03;
  --roast:      #2A0F02;
  --card-bg:    #1C0902;      /* dark brown card face */
  --card-bg2:   #240D03;      /* slightly lighter for back */
  --mid:        #5A2409;
  --warm:       #9B4A18;
  --cream:      #FFF6E8;
  --cream2:     #F0DEC2;
  --cream3:     #DCCAA4;
  --gold:       #C08C2E;
  --gold2:      #DDB054;
  --gold-light: #E8C97A;
  --gold-dim:   rgba(201,168,76,0.4);
  --white:      #FFFFFF;
  --white-soft: rgba(255,255,255,0.88);
  --white-dim:  rgba(255,255,255,0.55);
}

body {
  background: var(--cream);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'ITC Bauhaus', sans-serif;
  overflow: hidden;
}

/* ── Ambient glow ── */
.bg-ambient { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.bg-ambient::before {
  content: '';
  position: absolute; top: -20%; left: -20%;
  width: 60%; height: 60%;
  background: radial-gradient(ellipse, rgba(201,168,76,0.07) 0%, transparent 70%);
  animation: drift1 12s ease-in-out infinite alternate;
}
.bg-ambient::after {
  content: '';
  position: absolute; bottom: -20%; right: -20%;
  width: 60%; height: 60%;
  background: radial-gradient(ellipse, rgba(201,168,76,0.05) 0%, transparent 70%);
  animation: drift2 15s ease-in-out infinite alternate;
}
@keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(40px,30px); } }
@keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-30px,-40px); } }

/* ── Particles ── */
.particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.particle {
  position: absolute;
  width: 1px; height: 1px;
  background: var(--gold);
  border-radius: 50%;
  animation: float-up linear infinite;
  opacity: 0;
}
@keyframes float-up {
  0%   { opacity: 0; transform: translateY(0) scale(1); }
  10%  { opacity: 0.6; }
  90%  { opacity: 0.2; }
  100% { opacity: 0; transform: translateY(-100vh) scale(0.3); }
}

/* ── Scene / Card ── */
.scene {
  position: relative;
  z-index: 1;
  width: 420px;
  height: 260px;
  perspective: 1200px;
  cursor: pointer;
  user-select: none;
}
.card {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.9s cubic-bezier(0.45, 0.05, 0.55, 0.95);
  animation: float-card 6s ease-in-out infinite;
}
.card.flipped {
  transform: rotateY(180deg) !important;
  animation: none !important;
}
@keyframes float-card {
  0%, 100% { transform: rotateY(0deg) rotateX(0deg) translateY(0px); }
  25%       { transform: rotateY(3deg) rotateX(-2deg) translateY(-6px); }
  50%       { transform: rotateY(-2deg) rotateX(1deg) translateY(-10px); }
  75%       { transform: rotateY(2deg) rotateX(2deg) translateY(-4px); }
}

.face {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid rgba(201,168,76,0.28);
  box-shadow:
    0 0 0 0.5px rgba(201,168,76,0.15),
    0 30px 80px rgba(0,0,0,0.65),
    0 0 40px rgba(201,168,76,0.08),
    inset 0 1px 0 rgba(201,168,76,0.2);
}

/* ────────────── FRONT ────────────── */
.face-front {
  /* Dark brown gradient */
  background: linear-gradient(135deg, #1C0902 0%, #240D03 45%, #1A0802 100%);
  display: flex;
  align-items: center;
  justify-content: center;
}
.face-front::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.face-front::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
}

.front-inner {
  display: flex;
  align-items: center;
  gap: 28px;
  padding: 0 44px;
}

/* Logo circle */
.logo-wrap {
  flex-shrink: 0;
  width: 92px; height: 92px;
  border-radius: 50%;
  border: 1.5px solid rgba(201,168,76,0.4);
  display: flex; align-items: center; justify-content: center;
  background: #1C0902;
  box-shadow: 0 0 20px rgba(201,168,76,0.12);
  animation: pulse-ring 3s ease-in-out infinite;
  overflow: hidden;
  position: relative;
}
@keyframes pulse-ring {
  0%, 100% { box-shadow: 0 0 20px rgba(201,168,76,0.1); }
  50%       { box-shadow: 0 0 32px rgba(201,168,76,0.28); }
}
.bh-logo-img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  mix-blend-mode: screen;
  border-radius: 50%;
}
/* Fallback initials if image fails */
.logo-fallback {
  font-family: 'Mirza', serif;
  font-size: 28px; font-weight: 700;
  color: var(--gold);
  letter-spacing: 2px;
  display: none;
}

/* Text block */
.text-block { display: flex; flex-direction: column; gap: 2px; }

/* Headline → Mirza — cream/gold */
.card-name {
  font-family: 'Mirza', serif;
  font-size: 22px; font-weight: 600;
  letter-spacing: 2px;
  color: var(--gold-light);
  line-height: 1.2;
}

/* "Creative Studio" sub-label — white */
.card-title {
  font-family: 'ITC Bauhaus', sans-serif;
  font-size: 10px; font-weight: 300;
  color: var(--white-dim);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 3px;
}

.divider-line {
  width: 40px; height: 0.5px;
  background: linear-gradient(90deg, var(--gold-dim), transparent);
  margin-top: 10px; margin-bottom: 6px;
}

/* Tagline → Great Vibes — white tinted */
.card-tagline {
  font-family: 'Great Vibes', cursive;
  font-size: 14px;
  color: var(--white-soft);
  line-height: 1;
}

/* Brand stamp — white dim */
.brand-name {
  font-family: 'ITC Bauhaus', sans-serif;
  font-size: 8px; letter-spacing: 5px;
  color: var(--white-dim);
  text-transform: uppercase;
  margin-top: 8px;
}

/* Corner brackets */
.corner {
  position: absolute;
  width: 18px; height: 18px;
  border-color: rgba(201,168,76,0.3);
  border-style: solid;
}
.corner-tl { top: 14px; left: 14px;   border-width: 1px 0 0 1px; }
.corner-tr { top: 14px; right: 14px;  border-width: 1px 1px 0 0; }
.corner-bl { bottom: 14px; left: 14px;  border-width: 0 0 1px 1px; }
.corner-br { bottom: 14px; right: 14px; border-width: 0 1px 1px 0; }

.shimmer {
  position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(105deg, transparent 40%, rgba(201,168,76,0.05) 50%, transparent 60%);
  animation: shimmer 4s ease-in-out infinite;
}
@keyframes shimmer {
  0%        { transform: translateX(-100%); }
  40%, 100% { transform: translateX(200%); }
}

/* ────────────── BACK ────────────── */
.face-back {
  /* Dark brown — slightly warmer tone */
  background: linear-gradient(145deg, #200B02 0%, #2A0F03 50%, #1C0901 100%);
  transform: rotateY(180deg);
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  padding: 28px 36px;
}
.face-back::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.face-back::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
}

/* Back header → Mirza */
.back-header {
  font-family: 'Mirza', serif;
  font-size: 13px; font-weight: 500;
  letter-spacing: 3px;
  color: rgba(201,168,76,0.5);
  text-transform: uppercase;
  margin-bottom: 16px;
}

.contact-list { display: flex; flex-direction: column; gap: 11px; width: 100%; }

.contact-item {
  display: flex;
  align-items: center;
  gap: 13px;
  text-decoration: none;
  transition: all 0.2s;
}

.ci-icon {
  width: 28px; height: 28px;
  border-radius: 7px;
  border: 1px solid rgba(201,168,76,0.22);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  background: rgba(201,168,76,0.05);
  transition: all 0.25s;
}
.ci-icon svg { width: 14px; height: 14px; }

/* Label → hidden, icons speak for themselves */
.ci-label {
  display: none;
}

/* Value text → WHITE */
.ci-value {
  font-family: 'ITC Bauhaus', sans-serif;
  font-size: 10.5px; font-weight: 300;
  color: var(--white-soft);
  letter-spacing: 0.4px;
  transition: color 0.2s;
}

.contact-item:hover .ci-value  { color: var(--gold-light); }
.contact-item:hover .ci-icon   { border-color: rgba(201,168,76,0.5); background: rgba(201,168,76,0.1); }

.back-divider {
  width: 100%; height: 0.5px;
  background: linear-gradient(90deg, rgba(201,168,76,0.18), transparent);
  margin: 12px 0;
}

/* ── Hint ── */
.hint {
  position: absolute;
  bottom: -38px; left: 50%;
  transform: translateX(-50%);
  font-family: 'ITC Bauhaus', sans-serif;
  font-size: 8px; letter-spacing: 3px;
  color: rgba(90,36,9,0.5);
  text-transform: uppercase;
  white-space: nowrap;
  animation: blink 3s ease-in-out infinite;
}
@keyframes blink {
  0%, 100% { opacity: 0.35; }
  50%       { opacity: 0.9; }
}
</style>
</head>
<body>

<div class="bg-ambient"></div>
<div class="particles" id="particles"></div>

<div class="scene" id="scene">
  <div class="card" id="card">

    <!-- ══ FRONT ══ -->
    <div class="face face-front">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
      <div class="shimmer"></div>

      <div class="front-inner">

        <!-- Logo — place logo.png inside an "images" folder next to this file -->
        <div class="logo-wrap" id="logoWrap">
          <img class="bh-logo-img" id="logoImg"
               src="images/logo.png" alt="Kooky Kafe"
               onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block';">

        </div>

        <!-- Text -->
        <div class="text-block">
          <div class="card-name">Kooky Kafe</div>
          <div class="card-title">Finest Flavours</div>
          <div class="divider-line"></div>
          <div class="card-tagline">Bite · Sip · Savour.</div>
        </div>

      </div>
    </div>

    <!-- ══ BACK ══ -->
    <div class="face face-back">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <div class="back-header">Get in touch</div>

      <div class="contact-list">

        <!-- WhatsApp -->
        <a class="contact-item" href="https://wa.me/917011403207" target="_blank">
          <div class="ci-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" fill="#C08C2E"/>
              <path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.975-1.418A9.955 9.955 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm0 18a7.946 7.946 0 01-4.076-1.117l-.292-.174-3.029.864.861-3.03-.19-.302A7.948 7.948 0 014 12c0-4.411 3.589-8 8-8s8 3.589 8 8-3.589 8-8 8z" fill="#C08C2E" opacity="0.5"/>
            </svg>
          </div>
          <span class="ci-label">WhatsApp</span>
          <span class="ci-value">+91 7011403207</span>
        </a>

        <!-- Email -->
        <a class="contact-item" href="mailto:kafekooky@gmail.com" target="_blank">
          <div class="ci-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="5" width="18" height="14" rx="2" stroke="#C08C2E" stroke-width="1.4"/>
              <path d="M3 8l9 6 9-6" stroke="#C08C2E" stroke-width="1.4" stroke-linecap="round"/>

        <a class="contact-item" href="https://instagram.com/kafekooky" target="_blank">

              <rect x="3" y="3" width="18" height="18" rx="5" stroke="#C08C2E" stroke-width="1.4"/>

            </svg>

        </a>

      </div>
    </div>

  </div>
  <div class="hint" id="hint">tap to flip</div>
</div>

<script>
// ── Particles ──
const container = document.getElementById('particles');
for (let i = 0; i < 35; i++) {
  const p = document.createElement('div');
  p.classList.add('particle');
  p.style.left = Math.random() * 100 + 'vw';
  p.style.bottom = (Math.random() * 20 - 10) + 'vh';
  const s = (Math.random() * 2 + 1) + 'px';
  p.style.width = s; p.style.height = s;
  p.style.animationDuration = (Math.random() * 12 + 8) + 's';
  p.style.animationDelay    = (Math.random() * 12) + 's';
  container.appendChild(p);
}

// ── Flip ──
const scene = document.getElementById('scene');
const card  = document.getElementById('card');
const hint  = document.getElementById('hint');
let flipped = false;

scene.addEventListener('click', () => {
  flipped = !flipped;
  card.classList.toggle('flipped', flipped);
  hint.textContent = flipped ? 'tap to flip back' : 'tap to flip';
});

// ── Tilt on hover (front only) ──
scene.addEventListener('mousemove', e => {
  if (flipped) return;
  const r = scene.getBoundingClientRect();
  const x = (e.clientX - r.left) / r.width  - 0.5;
  const y = (e.clientY - r.top)  / r.height - 0.5;
  card.style.animation = 'none';
  card.style.transform = `rotateY(${x * 18}deg) rotateX(${-y * 12}deg)`;
});

scene.addEventListener('mouseleave', () => {
  if (!flipped) {
    card.style.transform = '';
    card.style.animation = 'float-card 6s ease-in-out infinite';
  }
});
</script>
</body>
</html>
